services:
  postgres:
    image: postgres:17.5-alpine
    container_name: yadro-test-test-pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'" ]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - yadro-test-test-pg:/var/lib/postgresql/data

  redis:
    image: redis
    restart: always
    container_name: yadro-test-test-redis
    volumes:
      - yadro-test-test-redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  yadro-test-test-pg:
  yadro-test-test-redis:
